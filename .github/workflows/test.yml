name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run safe tests
        run: |
          FAILED=0
          EXCLUDE_FILE="tests/ci-exclude.txt"
          
          for f in tests/test-*.sh; do
            fname=$(basename "$f")
            
            # Check if test is excluded
            if [ -f "$EXCLUDE_FILE" ] && grep -q "^${fname}$" "$EXCLUDE_FILE"; then
              echo "⏭️  Skipping $fname (excluded)"
              continue
            fi
            
            echo ""
            echo "▶️  Running $fname..."
            if bash "$f"; then
              echo "✅ $fname PASSED"
            else
              echo "❌ $fname FAILED"
              FAILED=1
            fi
          done
          
          echo ""
          echo "========================================="
          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All tests passed"
          else
            echo "❌ Some tests failed"
          fi
          exit $FAILED

      - name: Summary
        if: always()
        run: echo "Tests completed. Check output above for details."
