site_name: Kali i3
site_url: https://statick.github.io/kali-i3/
site_author: Statick
site_description: Automated i3-wm + security tools setup for Kali Linux with a NEON MINIMAL dark theme.

repo_name: statick/kali-i3
repo_url: https://github.com/statick/kali-i3

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/statick/kali-i3
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/statick_sec

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Phases: phases.md
  - Configuration: configuration.md
  - Customization: customization.md
  - Testing: testing.md
  - Contributing: contributing.md
